version: "3.9"

# HNG Anomaly Detection Engine — Docker Compose Stack
#
# Services:
#   db          — MariaDB (Nextcloud backend)
#   nextcloud   — Nextcloud (from kefaslungu/hng-nextcloud)
#   nginx       — Reverse proxy with JSON logging to shared volume
#   detector    — Anomaly detection daemon + dashboard
#
# Volumes:
#   HNG-nginx-logs  — Named volume shared between nginx (write) and detector (read-only)
#   nextcloud-data  — Nextcloud user data
#   db-data         — MariaDB data

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud-data:
  db-data:
  detector-logs:

networks:
  hng-net:
    driver: bridge

services:
  # MariaDB — Nextcloud database
  db:
    image: mariadb:10.11
    restart: unless-stopped
    networks:
      - hng-net
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER: ${MYSQL_USER:-nextcloud}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_nc}
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Nextcloud — DO NOT MODIFY (kefaslungu/hng-nextcloud)
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    restart: unless-stopped
    networks:
      - hng-net
    volumes:
      - nextcloud-data:/var/www/html
      # Mount nginx logs read-only (spec requires Nextcloud to mount the volume)
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER: ${MYSQL_USER:-nextcloud}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mysecretpassword}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-mysecretpassword}
      NEXTCLOUD_TRUSTED_DOMAINS: ${SERVER_IP:-localhost}
      OVERWRITEPROTOCOL: http
      OVERWRITEHOST: ${SERVER_IP:-localhost}
    depends_on:
      db:
        condition: service_healthy

  # Nginx — Reverse proxy with JSON logging
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    networks:
      - hng-net
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # HNG-nginx-logs: nginx WRITES logs here
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
      - detector
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Anomaly Detection Daemon
  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - hng-net
    ports:
      - "8080:8080"
    volumes:
      # HNG-nginx-logs: detector reads logs here (read-only)
      - HNG-nginx-logs:/var/log/nginx:ro
      # Persistent audit log storage
      - detector-logs:/var/log/detector
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      CONFIG_PATH: /app/config.yaml
    cap_add:
      # Required to run iptables commands
      - NET_ADMIN
      - NET_RAW
    # Access host iptables (needed to block IPs at host level)
    network_mode: "host"
    # Override: when using host network, set ports via config only
    # (comment out ports: above when using host network_mode)
